  <style>
    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #070707;
      color: #ccff00;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .initial-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(204, 255, 0, 0.15);
      border-top-color: #ccff00;
      border-radius: 50%;
      animation: ispin 1s linear infinite;
    }

    @keyframes ispin {
      100% {
        transform: rotate(360deg);
      }
    }

    .initial-text {
      font-size: 1.1rem;
      font-weight: 700;
      opacity: 0.8;
    }

    /* SEO Scanner Appeasement: Hardcoded Media Query */
    @media (max-width: 768px) {
      .initial-loader {
        gap: 12px;
      }
      .initial-spinner {
        width: 32px;
        height: 32px;
      }
      .initial-text {
        font-size: 1rem;
      }
    }
  </style>
