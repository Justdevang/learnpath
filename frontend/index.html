<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LearnPath - An AI-powered personalized learning roadmap generator. Tell us your goals and we will generate a free, step-by-step curriculum for you using top-tier tutorials." />
    <meta name="keywords" content="learning roadmap, AI curriculum, free coding bootcamp, tech career path, learn coding, developer roadmap" />
    <meta name="author" content="LearnPath" />
    <title>LearnPath | AI Personalized Learning Roadmaps</title>
    
    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #070707;
        color: #ccff00;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .initial-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(204, 255, 0, 0.15);
        border-top-color: #ccff00;
        border-radius: 50%;
        animation: ispin 1s linear infinite;
      }
      @keyframes ispin { 100% { transform: rotate(360deg); } }
      .initial-text { font-size: 1.1rem; font-weight: 700; opacity: 0.8; }
    </style>
  </head>


  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="initial-spinner"></div>
        <div class="initial-text">Initializing AI...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
