    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #070707;
        color: #ccff00;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .initial-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(204, 255, 0, 0.15);
        border-top-color: #ccff00;
        border-radius: 50%;
        animation: ispin 1s linear infinite;
      }
      @keyframes ispin { 100% { transform: rotate(360deg); } }
      .initial-text { font-size: 1.1rem; font-weight: 700; opacity: 0.8; }
    </style>
  </head>


  <body>
    <div id="root">
      <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">LearnPath: AI Personalized Learning Roadmaps</h1>
      <h2 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;">Generate your free custom developer curriculum with artificial intelligence</h2>
      
      <div class="initial-loader">
        <div class="initial-spinner"></div>
        <div class="initial-text">Initializing AI...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
